<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tricraft Website</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }
        
        .container {
            background: linear-gradient(135deg, #2d5016 0%, #1a3a0a 100%);
            padding: 50px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            text-align: center;
            max-width: 600px;
            border: 3px solid #4a7c1c;
        }
        
        h1 {
            color: #7cfc00;
            margin-bottom: 20px;
            font-size: 3em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        
        p {
            color: #d0d0d0;
            font-size: 1.2em;
            line-height: 1.8;
            margin: 15px 0;
        }
        
        .emoji {
            font-size: 4em;
            margin: 20px 0;
        }
        
        .button {
            background: #4a7c1c;
            color: #7cfc00;
            padding: 12px 30px;
            border: 2px solid #7cfc00;
            border-radius: 5px;
            font-size: 1.1em;
            cursor: pointer;
            margin-top: 20px;
            text-decoration: none;
            display: inline-block;
        }
        
        .button:hover {
            background: #7cfc00;
            color: #2d5016;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="emoji">⛏️</div>
        <h1>tricraft</h1>
        <p>Welkom op mijn tricraft website!</p>
        <p>Het meest epische blok-spel ooit gemaakt 🎮</p>
        <p>Bouw, verken en overleven in een oneindige wereld!</p>
        <a href="meestevragen.html" class="button">Meer Info</a>
    </div>
</body>
</html>
