<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meeste Vragen - Tricraft</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #2d5016;
            padding: 40px;
            border-radius: 10px;
            border: 3px solid #7cb342;
        }
        
        h1 {
            color: #7cb342;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #7cb342;
        }
        
        input[type="text"],
        input[type="email"],
        textarea {
            width: 100%;
            padding: 12px;
            background-color: #1a1a1a;
            color: #ffffff;
            border: 2px solid #7cb342;
            border-radius: 5px;
            font-family: Arial, sans-serif;
            font-size: 14px;
        }
        
        textarea {
            resize: vertical;
            min-height: 150px;
        }
        
        button {
            width: 100%;
            padding: 12px;
            background-color: #7cb342;
            color: #1a1a1a;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        
        button:hover {
            background-color: #9ccc65;
        }
        
        .back-button {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #7cb342;
            color: #1a1a1a;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            text-align: center;
        }
        
        .back-button:hover {
            background-color: #9ccc65;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📧 Stel een Vraag</h1>
        
        <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
            <div class="form-group">
                <label for="name">Jouw Naam:</label>
                <input type="text" id="name" name="name" required>
            </div>
            
            <div class="form-group">
                <label for="email">Jouw Email:</label>
                <input type="email" id="email" name="email" required>
            </div>
            
            <div class="form-group">
                <label for="question">Jouw Vraag:</label>
                <textarea id="question" name="question" required></textarea>
            </div>
            
            <button type="submit">Stuur Vraag ➤</button>
        </form>
        
        <a href="index.html" class="back-button">← Terug naar Home</a>
    </div>
</body>
</html>
